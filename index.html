<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EarnCampus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>


  <header class="main-header">
    <h1 class="app-title">EarnCampus</h1>
  </header>

  <div class="tab-section">
    <button id="needTab" class="tab-button active-tab">I NEED</button>
    <button id="offerTab" class="tab-button">I OFFER</button>
  </div>

  <select id="hostelSelect">
    <option value="">All Hostels</option>
    <option value="COEP Boys Hostel">COEP Boys Hostel</option>
    <option value="IIT Bombay Boys Hostel">IIT Bombay Boys Hostel</option>
  </select>

  <div class="post-form-section">
    <input type="text" id="postTitle" placeholder="What do you need or offer?" />
    <textarea id="postDetails" placeholder="Add more details..."></textarea>
    <input type="number" id="postPrice" placeholder="Enter price ₹" />
    <button id="postBtn" class="post-button">Post</button>
  </div>

  <div class="feed-section">
    <h2 id="feedHeading">I NEED POSTS</h2>
    <div id="postFeed"></div>
  </div>


<script src="app.js"></script>
</body>
</html>
